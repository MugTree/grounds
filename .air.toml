root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/app"
  cmd = "templ generate && go build -o ./tmp/app ."
  delay = 1000
  exclude_dir = ["uploads", "tmp", "log", "scripts", "data", "bin"]
  exclude_file = ["pico.css"]
  exclude_regex = [".*_templ.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "templ", "html", "js", "css"]
  kill_delay = "0s"
  log = "./log/build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "red"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false

[proxy]
  enabled = true
  proxy_port = 8081
  app_port = 8080